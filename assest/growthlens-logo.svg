<svg width="100%" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 48px;
      font-weight: 700;
      fill: #C8FB4A;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }

    .sub {
      font-size: 18px;
      fill: #ffff;
      letter-spacing: 6px;
    }

    @keyframes glow {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }
  </style>

  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="text">
    GROWTHLENS AI
  </text>

  <text x="50%" y="85%" dominant-baseline="middle" text-anchor="middle" class="sub">
    SEO • ANALYZE • SCALE
  </text>
</svg>